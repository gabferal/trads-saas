# alembic.ini – Configuração básica do Alembic para migrações
# A URL do banco é sobrescrita em env.py via variável de ambiente

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# A URL abaixo é um placeholder; env.py usa DATABASE_URL do ambiente
sqlalchemy.url = postgresql://neondb_owner:npg_IBLjro0Psp5J@ep-falling-wildflower-aceu8am6-pooler.sa-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
